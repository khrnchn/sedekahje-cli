name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' package.json | cut -d'"' -f4)
          TAG="v${VERSION}+${GITHUB_SHA:0:7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Linux x64
        run: bun build src/index.tsx --compile --target=bun-linux-x64 --outfile=dist/sedekah-linux-x64

      - name: Build Linux arm64
        run: bun build src/index.tsx --compile --target=bun-linux-arm64 --outfile=dist/sedekah-linux-arm64

      - name: Build macOS x64
        run: bun build src/index.tsx --compile --target=bun-darwin-x64 --outfile=dist/sedekah-darwin-x64

      - name: Build macOS arm64 (Apple Silicon)
        run: bun build src/index.tsx --compile --target=bun-darwin-arm64 --outfile=dist/sedekah-darwin-arm64

      - name: Build Windows x64
        run: bun build src/index.tsx --compile --target=bun-windows-x64 --outfile=dist/sedekah-windows-x64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
